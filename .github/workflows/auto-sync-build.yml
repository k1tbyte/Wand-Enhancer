name: Auto sync and build

# Builds a Windows executable directly from each upstream Wand-Enhancer release and
# publishes it as a downloadable release on this fork. master is never modified, so the
# fork's strict branch protection (PR + signed commits + status checks) stays intact —
# upstream commits aren't signed by us, so merging them into master is not an option.

on:
  schedule:
    - cron: '0 12 * * *'  # daily at noon UTC; releases are infrequent, 6h was excessive
  workflow_dispatch:
    inputs:
      force:
        description: 'Build & publish a release even if this version was already built'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # only reads upstream + this fork's existing releases
    outputs:
      new_release: ${{ steps.compare.outputs.new_release }}
      version: ${{ steps.compare.outputs.version }}

    steps:
      - name: Get upstream latest release tag
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/k1tbyte/Wand-Enhancer/releases/latest --jq '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Upstream: $TAG"

      # Idempotency without a repo variable: if we've already published a release for
      # this tag, there's nothing to do. This avoids the GITHUB_TOKEN limitation that
      # prevents workflows from writing Actions variables (the old LAST_BUILT_VERSION).
      - name: Decide whether to build
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.upstream.outputs.tag }}
          FORCE: ${{ inputs.force }}
        run: |
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [ "$FORCE" = "true" ]; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "Force build requested — building $TAG regardless of existing releases."
          elif gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already published — nothing to do."
          else
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "New upstream release $TAG detected."
          fi

  build:
    needs: check
    if: needs.check.outputs.new_release == 'true'
    # Keep windows-latest — build.ps1 explicitly auto-detects VS version ("pick whatever VS the host has")
    runs-on: windows-latest
    permissions:
      contents: write  # required to publish the GitHub release (and tag) on this fork

    steps:
      # Check out UPSTREAM's source at the released tag, so the executable is built from
      # upstream's exact code. The tag is self-contained (build.ps1, scripts/, csproj,
      # pnpm lockfile all present), so no fork files are needed to build.
      - uses: actions/checkout@v5  # v5 uses Node.js 24
        with:
          repository: k1tbyte/Wand-Enhancer
          ref: ${{ needs.check.outputs.version }}
          fetch-depth: 0  # full history so the changelog/tag resolves cleanly

      - uses: pnpm/action-setup@v4
        with:
          version: 10  # must match the version used to generate web-panel/pnpm-lock.yaml

      - uses: actions/setup-node@v5  # v5 uses Node.js 24
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-panel/pnpm-lock.yaml

      - name: Build
        shell: pwsh
        run: ./build.ps1 -Configuration Release

      - uses: actions/upload-artifact@v4
        with:
          name: WandEnhancer-${{ needs.check.outputs.version }}
          path: WandEnhancer/bin/Release/WandEnhancer.exe
          if-no-files-found: error
          retention-days: 90

      # Pull release notes from upstream's changelog if a matching section exists;
      # otherwise fall back to a generic note so the release always publishes.
      - name: Generate release notes
        if: success()
        shell: pwsh
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          try {
            ./scripts/get-changelog-section.ps1 -Version $env:VERSION -OutputPath release-notes.md
          } catch {
            Write-Host "Changelog lookup failed ($($_.Exception.Message)); using fallback notes."
          }
          if (-not (Test-Path release-notes.md) -or -not (Get-Content release-notes.md -Raw).Trim()) {
            "Automated build of upstream Wand-Enhancer release **$env:VERSION**." | Out-File release-notes.md -Encoding utf8
          }

      - name: Publish GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          name: ${{ needs.check.outputs.version }}
          target_commitish: master  # anchor the fork tag to a commit that exists in this repo
          body_path: release-notes.md
          files: WandEnhancer/bin/Release/WandEnhancer.exe
          fail_on_unmatched_files: true
